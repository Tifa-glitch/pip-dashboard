<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓓福業務日報 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #6b7280;
  --text3: #9ca3af;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

.topbar { background: #2e7d32; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.6); }
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: #fff; }
.topbar-sub { font-size: 12px; color: rgba(255,255,255,0.65); font-family: 'DM Mono', monospace; }
.last-updated { font-size: 11px; color: rgba(255,255,255,0.65); font-family: 'DM Mono', monospace; }
.refresh-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); color: #fff; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.refresh-btn:hover { background: rgba(255,255,255,0.28); }

.main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

.tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); color: var(--text2); background: transparent; transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif; }
.tab:hover { border-color: #2e7d32; color: #2e7d32; }
.tab.active { background: rgba(46,125,50,0.08); border-color: #2e7d32; color: #2e7d32; }

.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.scard { background: #f0fdf4; border: 1px solid rgba(46,125,50,0.15); border-radius: 10px; padding: 16px; }
.scard-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.scard-val { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
.scard-sub { font-size: 11px; color: var(--text2); }
.scard.teal .scard-val  { color: #2e7d32; }
.scard.blue .scard-val  { color: #388e3c; }
.scard.amber .scard-val { color: #1b5e20; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }

.panel { background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 18px; }
.panel-title { font-size: 11px; font-weight: 700; color: #2e7d32; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

.prow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.prow:last-child { margin-bottom: 0; }
.pname { font-size: 13px; font-weight: 500; min-width: 44px; }
.pbar-bg { flex: 1; height: 6px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
.pbar { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.ppct { font-size: 12px; font-family: 'DM Mono', monospace; min-width: 38px; text-align: right; }
.pval { font-size: 11px; color: var(--text3); min-width: 68px; text-align: right; font-family: 'DM Mono', monospace; }
.badge-ok   { color: #16a34a; }
.badge-mid  { color: #2e7d32; }
.badge-low  { color: #dc2626; }
.badge-none { color: var(--text3); }

.chart-wrap { position: relative; width: 100%; height: 200px; }

.region-block { margin-bottom: 14px; }
.region-block:last-child { margin-bottom: 0; }
.region-label { font-size: 11px; font-weight: 700; color: #2e7d32; text-transform: uppercase; letter-spacing: 0.07em; padding: 0 0 6px 8px; margin-bottom: 4px; }
.rank-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
.rank-row:last-child { border-bottom: none; }
.rank-name { font-size: 13px; font-weight: 500; flex: 1; }
.rank-bar-bg { width: 120px; height: 5px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
.rank-bar { height: 100%; border-radius: 3px; }
.rank-val { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); min-width: 80px; text-align: right; }

.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 12px; color: var(--text3); }
.spinner { width: 28px; height: 28px; border: 2px solid #dcfce7; border-top-color: #2e7d32; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.note { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
.footer { text-align: center; padding: 32px 20px 20px; font-size: 11px; color: var(--text3); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <span class="topbar-title">蓓福業務日報</span>
    <span class="topbar-sub">DASHBOARD · 第三期 5–6月</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="last-updated" id="lastUpdated">載入中...</span>
    <button class="refresh-btn" onclick="loadData()">重新整理</button>
  </div>
</div>

<div class="main">
  <div class="tabs" id="metricTabs"></div>
  <div class="summary-grid" id="summaryCards"></div>
  <div id="mainContent">
    <div class="state-box"><div class="spinner"></div><span>載入資料中...</span></div>
  </div>
</div>

<div class="footer">蓓福業務日報系統 · 資料來源：Google Sheets · 每次開啟自動更新</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ════════════════════════════════════
//  ★ 貼上 Apps Script Web App 網址
// ════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxy1FlHMJzahYjP46fSpV6Jubprnsa1R10TzsPLfZl-0JyTkAgH54NVq2vL-mTnKst2Tg/exec';

// ── fallback 示範資料 ──
const FALLBACK_RAW = [
  {date:'05/01',name:'張田裕', order:3, mdt:25, mdc:18, bdt:15, bdc:40, svt_f:5, svt_b:30, svc_f:3, svc_b:18, pay:5000,  pay_cum:5000},
  {date:'05/01',name:'劉自強', order:2, mdt:20, mdc:15, bdt:10, bdc:35, svt_f:4, svt_b:25, svc_f:2, svc_b:14, pay:4000,  pay_cum:4000},
  {date:'05/01',name:'楊承舜', order:4, mdt:22, mdc:16, bdt:18, bdc:38, svt_f:6, svt_b:35, svc_f:4, svc_b:22, pay:6000,  pay_cum:6000},
  {date:'05/01',name:'陳峰毓', order:2, mdt:18, mdc:10, bdt:12, bdc:25, svt_f:3, svt_b:20, svc_f:2, svc_b:10, pay:3000,  pay_cum:3000},
  {date:'05/01',name:'林恩霆', order:3, mdt:21, mdc:14, bdt:15, bdc:30, svt_f:5, svt_b:28, svc_f:3, svc_b:15, pay:4500,  pay_cum:4500},
  {date:'05/01',name:'李靜宜', order:1, mdt:12, mdc:7,  bdt:8,  bdc:18, svt_f:2, svt_b:15, svc_f:1, svc_b:6,  pay:2000,  pay_cum:2000},
  {date:'05/01',name:'顏廷樨', order:2, mdt:18, mdc:12, bdt:12, bdc:26, svt_f:4, svt_b:22, svc_f:2, svc_b:12, pay:3500,  pay_cum:3500},
  {date:'05/01',name:'范振軒', order:3, mdt:24, mdc:11, bdt:14, bdc:28, svt_f:5, svt_b:30, svc_f:3, svc_b:16, pay:5000,  pay_cum:5000},
  {date:'05/01',name:'黃敬凱', order:2, mdt:17, mdc:16, bdt:10, bdc:35, svt_f:4, svt_b:24, svc_f:2, svc_b:12, pay:4000,  pay_cum:4000},
];
const FALLBACK_TARGETS = {
  '張田裕': { mdt:119, mdc:103, bdt:71,  bdc:162, svt_f:157, svt_b:703,  svc_f:6, svc_b:398  },
  '劉自強': { mdt:86,  mdc:83,  bdt:23,  bdc:153, svt_f:165, svt_b:739,  svc_f:8, svc_b:972  },
  '楊承舜': { mdt:88,  mdc:71,  bdt:74,  bdc:131, svt_f:146, svt_b:626,  svc_f:5, svc_b:1286 },
  '陳峰毓': { mdt:56,  mdc:70,  bdt:97,  bdc:96,  svt_f:162, svt_b:700,  svc_f:3, svc_b:466  },
  '林恩霆': { mdt:104, mdc:71,  bdt:70,  bdc:107, svt_f:152, svt_b:730,  svc_f:2, svc_b:115  },
  '李靜宜': { mdt:64,  mdc:55,  bdt:42,  bdc:101, svt_f:127, svt_b:553,  svc_f:2, svc_b:202  },
  '顏廷樨': { mdt:91,  mdc:23,  bdt:62,  bdc:55,  svt_f:140, svt_b:650,  svc_f:5, svc_b:562  },
  '范振軒': { mdt:119, mdc:34,  bdt:61,  bdc:94,  svt_f:155, svt_b:709,  svc_f:6, svc_b:413  },
  '黃敬凱': { mdt:84,  mdc:36,  bdt:50,  bdc:82,  svt_f:128, svt_b:554,  svc_f:4, svc_b:120  },
};

// ── 指標定義 ──
const METRICS = [
  { key:'mdt',     label:'中判陳列優化 傳統', unit:'家', hasTarget:true  },
  { key:'mdc',     label:'中判陳列優化 連鎖', unit:'家', hasTarget:true  },
  { key:'bdt',     label:'大判陳列優化 傳統', unit:'家', hasTarget:true  },
  { key:'bdc',     label:'大判陳列優化 連鎖', unit:'家', hasTarget:true  },
  { key:'svt_f',   label:'超值包 傳統家數',   unit:'家', hasTarget:true  },
  { key:'svt_b',   label:'超值包 傳統盒數',   unit:'盒', hasTarget:true  },
  { key:'svc_f',   label:'超值包 連鎖家數',   unit:'家', hasTarget:true  },
  { key:'svc_b',   label:'超值包 連鎖盒數',   unit:'盒', hasTarget:true  },
  { key:'order',   label:'訂單數',            unit:'單', hasTarget:false },
  { key:'pay',     label:'今日收款金額',       unit:'元', hasTarget:false },
  { key:'pay_cum', label:'累計收款金額',       unit:'元', hasTarget:false },
];

const REGIONS = [
  { label: '北區', names: ['張田裕','劉自強','楊承舜','顏廷樨'] },
  { label: '中區', names: ['陳峰毓','林恩霆','李靜宜'] },
  { label: '南區', names: ['范振軒','黃敬凱'] },
];
const NAMES = REGIONS.flatMap(r => r.names);
const REGION_COLORS = { '北區':'#2e7d32', '中區':'#388e3c', '南區':'#1b5e20' };
const COLORS = NAMES.map(n => {
  const r = REGIONS.find(rg => rg.names.includes(n));
  return r ? REGION_COLORS[r.label] : '#2e7d32';
});

let RAW = FALLBACK_RAW;
let TARGETS = FALLBACK_TARGETS;
let activeMetric = 'mdt';
let chartInst = null;

// ── 資料載入 ──
async function loadData() {
  document.getElementById('lastUpdated').textContent = '更新中...';
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    renderAll();
    document.getElementById('lastUpdated').textContent = '示範資料（未設定 Apps Script URL）';
    return;
  }
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
    const json = await res.json();
    if (json.raw && json.targets) {
      RAW = json.raw; TARGETS = json.targets;
      document.getElementById('lastUpdated').textContent = '最後更新：' + new Date().toLocaleTimeString('zh-TW');
    } else { throw new Error('格式錯誤'); }
  } catch(e) {
    console.warn('讀取失敗，使用示範資料', e);
    RAW = FALLBACK_RAW; TARGETS = FALLBACK_TARGETS;
    document.getElementById('lastUpdated').textContent = '示範資料（連線失敗）';
  }
  renderAll();
}

// ── 計算 ──
function getLatest(name, key) {
  // 累計型：優先抓有填值(>0)的最新一天，避免當天空白蓋掉前一天的值
  const rows = RAW.filter(r => r.name === name && (r[key] || 0) > 0)
                  .sort((a,b) => b.date.localeCompare(a.date));
  return rows.length ? (rows[0][key] || 0) : 0;
}
function getSum(name, key) {
  return RAW.filter(r => r.name === name).reduce((acc, r) => acc + (r[key] || 0), 0);
}
// order、pay = 今日新增（加總）；其餘 = 累計（抓最新）
function getValue(name, key) {
  return (key === 'order' || key === 'pay') ? getSum(name, key) : getLatest(name, key);
}
function getTarget(name, key) { return TARGETS[name]?.[key] ?? null; }

// ── Render ──
function renderAll() { renderTabs(); renderSummary(); renderMain(); }

function renderTabs() {
  document.getElementById('metricTabs').innerHTML = METRICS.map(m =>
    `<button class="tab${m.key===activeMetric?' active':''}" onclick="setMetric('${m.key}')">${m.label}</button>`
  ).join('');
}

function renderSummary() {
  const m = METRICS.find(x => x.key === activeMetric);
  const latestDate = RAW.length ? RAW.reduce((a,b) => a.date>b.date?a:b).date : '—';
  const fmt = v => v >= 10000 ? Math.round(v/10000) + '萬' : v.toLocaleString();
  let html = '';

  if (m.hasTarget) {
    let tv=0, tt=0;
    NAMES.forEach(n => { tv += getLatest(n,m.key); const t=getTarget(n,m.key); if(t) tt+=t; });
    const pct   = tt > 0 ? Math.round(tv/tt*100) : 0;
    const above = NAMES.filter(n => { const v=getLatest(n,m.key),t=getTarget(n,m.key); return t&&v>=t; }).length;
    const avg = NAMES.length > 0 ? Math.round(tv / NAMES.length) : 0;
    const avgTgt = tt > 0 ? Math.round(tt / NAMES.length) : 0;
    html = `
      <div class="scard teal"><div class="scard-label">整體達成率</div><div class="scard-val">${pct}%</div><div class="scard-sub">${m.label}</div></div>
      <div class="scard blue"><div class="scard-label">已達標人數</div><div class="scard-val">${above}<span style="font-size:16px;color:var(--text3)"> / ${NAMES.length}</span></div><div class="scard-sub">人達目標</div></div>
      <div class="scard amber"><div class="scard-label">人均累計</div><div class="scard-val">${avg}</div><div class="scard-sub">目標人均 ${avgTgt} ${m.unit}</div></div>`;

  } else if (m.key === 'order') {
    const total = NAMES.reduce((a,n) => a+getSum(n,'order'), 0);
    const max   = Math.max(...NAMES.map(n => getSum(n,'order')));
    const top   = NAMES.find(n => getSum(n,'order') === max) || '—';
    html = `
      <div class="scard teal"><div class="scard-label">全隊累計訂單</div><div class="scard-val">${total}</div><div class="scard-sub">單（本月）</div></div>
      <div class="scard blue"><div class="scard-label">最多訂單</div><div class="scard-val">${max}</div><div class="scard-sub">${top}</div></div>
      <div class="scard amber"><div class="scard-label">人均訂單</div><div class="scard-val">${Math.round(total/NAMES.length)}</div><div class="scard-sub">單 / 人</div></div>`;

  } else if (m.key === 'pay' || m.key === 'pay_cum') {
    const fn    = m.key === 'pay' ? (n => getSum(n,'pay')) : (n => getLatest(n,'pay_cum'));
    const total = NAMES.reduce((a,n) => a+fn(n), 0);
    const max   = Math.max(...NAMES.map(fn));
    const top   = NAMES.find(n => fn(n) === max) || '—';
    html = `
      <div class="scard teal"><div class="scard-label">全隊${m.label}</div><div class="scard-val" style="font-size:22px">${fmt(total)}</div><div class="scard-sub">元（本月）</div></div>
      <div class="scard blue"><div class="scard-label">最高收款</div><div class="scard-val" style="font-size:22px">${fmt(max)}</div><div class="scard-sub">${top}</div></div>
      <div class="scard amber"><div class="scard-label">有收款人數</div><div class="scard-val">${NAMES.filter(n=>fn(n)>0).length}</div><div class="scard-sub">人</div></div>`;

  } else {
    // 無目標累計指標（order/pay 已在上方處理）
    const total = NAMES.reduce((a,n) => a+getLatest(n,m.key), 0);
    const max   = Math.max(...NAMES.map(n => getLatest(n,m.key)));
    const top   = NAMES.find(n => getLatest(n,m.key) === max) || '—';
    const avg2  = NAMES.length > 0 ? Math.round(total / NAMES.length) : 0;
    html = `
      <div class="scard teal"><div class="scard-label">全隊累計</div><div class="scard-val">${total}</div><div class="scard-sub">${m.unit}（本月）</div></div>
      <div class="scard blue"><div class="scard-label">最多累計</div><div class="scard-val">${max}</div><div class="scard-sub">${top}</div></div>
      <div class="scard amber"><div class="scard-label">人均累計</div><div class="scard-val">${avg2}</div><div class="scard-sub">${m.unit} / 人</div></div>`;
  }
  document.getElementById('summaryCards').innerHTML = html;
}

function renderMain() {
  const m  = METRICS.find(x => x.key === activeMetric);
  const el = document.getElementById('mainContent');
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  if (m.hasTarget) {
    el.innerHTML = `
      <div class="two-col">
        <div class="panel"><div class="panel-title">個人達成率</div><div id="progBars"></div></div>
        <div class="panel"><div class="panel-title">累計值 vs 目標</div><div class="chart-wrap"><canvas id="myChart"></canvas></div></div>
      </div>`;
    renderProgressBars(m);
    renderChart(m);
  } else {
    const maxVal = Math.max(...NAMES.map(n => getValue(n,m.key))) || 1;
    const regionRows = REGIONS.map(region => {
      const rColor = REGION_COLORS[region.label];
      const rows = region.names.map(name => {
        const val = getValue(name, m.key);
        const dispVal = (m.key==='pay'||m.key==='pay_cum')
          ? 'NT$ ' + (val>=10000 ? Math.round(val/10000)+'萬' : val.toLocaleString())
          : val + ' ' + m.unit;
        return `<div class="rank-row">
          <span class="rank-name" style="min-width:52px">${name}</span>
          <div class="rank-bar-bg" style="flex:1"><div class="rank-bar" style="width:${Math.round(val/maxVal*100)}%;background:${rColor}"></div></div>
          <span class="rank-val">${dispVal}</span>
        </div>`;
      }).join('');
      return `<div class="region-block">
        <div class="region-label" style="border-left:3px solid ${rColor}">${region.label}</div>${rows}</div>`;
    }).join('');
    el.innerHTML = `
      <div class="panel"><div class="panel-title">${m.label} — 區域明細</div><p class="note">此指標無目標值，僅顯示累計數字</p>${regionRows}</div>
      <div class="panel" style="margin-top:16px"><div class="panel-title">長條圖比較</div><div class="chart-wrap"><canvas id="myChart"></canvas></div></div>`;
    renderChart(m);
  }
}

function renderProgressBars(m) {
  const el = document.getElementById('progBars');
  if (!el) return;
  el.innerHTML = REGIONS.map(region => {
    const rColor = REGION_COLORS[region.label];
    const rows = region.names.map(name => {
      const v = getLatest(name, m.key);
      const t = getTarget(name, m.key);
      const p = t ? Math.round(v/t*100) : null;
      const w = p !== null ? Math.min(p,100) : 0;
      const barColor = p===null?'#d1d5db':p>=100?'#16a34a':p>=70?'#2e7d32':'#dc2626';
      const pClass   = p===null?'badge-none':p>=100?'badge-ok':p>=70?'badge-mid':'badge-low';
      return `<div class="prow">
        <span class="pname">${name}</span>
        <div class="pbar-bg"><div class="pbar" style="width:${w}%;background:${barColor}"></div></div>
        <span class="ppct ${pClass}">${p===null?'—':p+'%'}</span>
        <span class="pval">${t ? v+' / '+t : v}</span>
      </div>`;
    }).join('');
    return `<div class="region-block"><div class="region-label" style="border-left:3px solid ${rColor}">${region.label}</div>${rows}</div>`;
  }).join('');
}

function renderChart(m) {
  const canvas = document.getElementById('myChart');
  if (!canvas) return;
  const vals = NAMES.map(n => getValue(n, m.key));
  const tgts = m.hasTarget ? NAMES.map(n => getTarget(n,m.key)||0) : null;
  const datasets = [{
    label: '最新累計', data: vals,
    backgroundColor: NAMES.map((_,i) => COLORS[i]+'99'),
    borderColor: COLORS, borderWidth: 1, borderRadius: 4,
  }];
  if (tgts) datasets.push({ label:'目標值', data:tgts, backgroundColor:'transparent', borderColor:'rgba(0,0,0,0.2)', borderWidth:1.5, borderRadius:4 });
  chartInst = new Chart(canvas, {
    type: 'bar',
    data: { labels: NAMES, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks:{ color:'#9ca3af', font:{size:11}, autoSkip:false }, grid:{ display:false }, border:{ color:'rgba(0,0,0,0.08)' } },
        y: { ticks:{ color:'#9ca3af', font:{size:10}, callback: v => (m.key==='pay'||m.key==='pay_cum')&&v>=10000 ? Math.round(v/10000)+'萬' : v },
             grid:{ color:'rgba(0,0,0,0.05)' }, border:{ color:'rgba(0,0,0,0.08)' } },
      }
    }
  });
}

function setMetric(key) { activeMetric = key; renderAll(); }

loadData();
</script>
